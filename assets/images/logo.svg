<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="frontGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#A89BFF"/>
    <stop offset="50%" stop-color="#7B6CF6"/>
    <stop offset="100%" stop-color="#4338CA"/>
  </linearGradient>
  <linearGradient id="shineGrad" x1="0" y1="10" x2="0" y2="26" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="white" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="topFaceGrad" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#6B5EE8"/>
    <stop offset="100%" stop-color="#5247CC"/>
  </linearGradient>
  <linearGradient id="sideFaceGrad" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2E27A0"/>
    <stop offset="100%" stop-color="#1C1870"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- 3D right side face of right bar -->
<path d="M 56,10 L 60,7 L 60,55 L 56,58 Z" fill="url(#sideFaceGrad)"/>

<!-- 3D top surface of the M -->
<path d="M 4,10 L 8,7 L 16,7 L 34,33 L 52,7 L 60,7 L 56,10 L 48,10 L 30,36 L 12,10 Z"
      fill="url(#topFaceGrad)"/>

<!-- Main M front face -->
<path d="M 4,10 L 12,10 L 30,36 L 48,10 L 56,10 L 56,58 L 48,58 L 48,22 L 30,46 L 12,22 L 12,58 L 4,58 Z"
      fill="url(#frontGrad)" filter="url(#glow)"/>

<!-- Specular shine -->
<path d="M 4,10 L 12,10 L 30,36 L 48,10 L 56,10 L 56,18 L 48,18 L 30,42 L 12,18 L 4,18 Z"
      fill="url(#shineGrad)"/>
</svg>
